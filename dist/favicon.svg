<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#C0392B"/>
  
  <!-- Route dotted path: curved journey line -->
  <path d="M 22 68 Q 30 35 55 42 Q 72 48 72 32" 
        stroke="white" stroke-width="3.5" fill="none" 
        stroke-linecap="round" stroke-dasharray="4 5" opacity="0.85"/>
  
  <!-- Location pin at end of path -->
  <circle cx="72" cy="27" r="7" fill="white"/>
  <circle cx="72" cy="27" r="3.2" fill="#C0392B"/>
  
  <!-- Starting dot -->
  <circle cx="22" cy="68" r="3.5" fill="white" opacity="0.9"/>
</svg>
